// =====================================================================
// bff-server — 실행 모듈 (API 단일 진입점 / Gateway)
//   - 역할: 라우팅, JWT 검증, RAG Pipeline 호출, SSE 중계
//   - Spring MVC + Virtual Threads (WebFlux/Mono/Flux 사용 금지)
// =====================================================================

apply plugin: 'org.springframework.boot'
apply plugin: 'io.spring.dependency-management'

// gateway-mvc 등 Spring Cloud 산출물 버전을 BOM 으로 정렬 (버전은 root 에서 고정)
dependencyManagement {
    imports {
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
    }
    dependencies {
        // 임베디드 MongoDB(flapdoodle 4.22)가 commons-compress 1.27+ API 를 요구하므로
        // Spring Boot 3.3.5 BOM 의 기본값(1.26.x)을 override
        dependency 'org.apache.commons:commons-compress:1.27.1'
    }
}

dependencies {
    // 공통 응답/예외 라이브러리 (api 로 노출된 spring-web 등 전이됨)
    implementation project(':common')

    implementation 'org.springframework.boot:spring-boot-starter-web'
    // Servlet 기반 Gateway (WebFlux 대신 MVC — Virtual Threads 조합 유지)
    implementation 'org.springframework.cloud:spring-cloud-starter-gateway-mvc'

    implementation 'org.springframework.boot:spring-boot-starter-validation'

    // 대화/메시지/피드백 영속 (MongoDB). MySQL/JPA 는 3단계의 users/tokens/ACL 도입 시 추가
    implementation 'org.springframework.boot:spring-boot-starter-data-mongodb'

    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    // /actuator/prometheus 노출용 (런타임에만 필요)
    runtimeOnly 'io.micrometer:micrometer-registry-prometheus'

    implementation 'org.springframework.boot:spring-boot-starter-security'

    // BFF/Gateway 단에서 JWT Resource Server 방식으로 토큰 검증할 경우 사용
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-resource-server'

    // 컴파일 시에만 필요, 산출물에는 미포함
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    // @DataMongoTest 용 임베디드 MongoDB (Spring Boot 3.x / Spring 6 호환 모듈)
    testImplementation 'de.flapdoodle.embed:de.flapdoodle.embed.mongo.spring30x:4.22.0'
    // ML Pipeline SSE 응답 모킹 (Feature 5에서 사용, 의존성은 본 Feature에서 선반영)
    testImplementation 'org.wiremock:wiremock-standalone:3.9.2'
}

// 실행 모듈: 부팅 가능한 fat jar 생성, 일반 jar 는 불필요하므로 비활성
tasks.named('bootJar') {
    enabled = true
}

tasks.named('jar') {
    enabled = false
}
spring:
  application:
    name: lina-bff-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      # 평문 secret 미포함 — URI 는 환경 변수/Secret 으로만 주입 (예: mongodb://user:pwd@host:27017)
      uri: ${BFF_MONGODB_URI:mongodb://localhost:27017}
      database: ${BFF_MONGODB_DATABASE:lina}
      # 엔티티의 @Indexed / @CompoundIndex 를 부팅 시 자동 생성
      auto-index-creation: true

server:
  port: ${BFF_SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    root: INFO
    com.lina: INFO

lina:
  # RAG Pipeline(/ml/query) 진입점. 사용자 질의 → SSE 스트리밍 응답 중계용.
  # ML 서버 단일 배포면 ML_PIPELINE_BASE_URL 만 지정하면 data-ingestion 도 같은 값으로 fallback.
  # Confluence 토큰은 본 클라이언트의 /ml/query 본문에 미포함 — ACL 은 Qdrant payload 에 저장되고
  # 질의 시 JWT 의 user_id/groups 로 필터링한다 (api-spec.md §2-1, 기획서 §6.4/§6.6).
  rag:
    base-url: ${ML_PIPELINE_BASE_URL:}
    request-timeout-ms: ${ML_PIPELINE_TIMEOUT_MS:30000}
    sse-timeout-ms: ${ML_PIPELINE_SSE_TIMEOUT_MS:60000}
    history-turns: ${ML_PIPELINE_HISTORY_TURNS:10}
  # Data Ingestion Pipeline(/ml/ingest) 진입점. 수집 서버 별도 배포면 DATA_INGESTION_BASE_URL 지정,
  # 동일 ML 서버면 ML_PIPELINE_BASE_URL 로 fallback. Confluence 토큰(lina.confluence.*)은
  # 이 클라이언트의 /ml/ingest 요청 본문에 실린다.
  data-ingestion:
    base-url: ${DATA_INGESTION_BASE_URL:${ML_PIPELINE_BASE_URL:}}
    request-timeout-ms: ${DATA_INGESTION_TIMEOUT_MS:30000}
  # Confluence OAuth 토큰/cloudId 전달 (3단계 auth-server PoC 도입)
  # 평문 secret 미포함 — 모두 환경 변수 주입. PoC 모드에서만 사용하며 확장 단계에서 connectionId 로 대체된다.
  confluence:
    access-token: ${CONFLUENCE_ACCESS_TOKEN:}
    cloud-id: ${CONFLUENCE_CLOUD_ID:}
  auth-server:
    base-url: ${AUTH_SERVER_BASE_URL:}
  jwt:
    issuer: ${LINA_JWT_ISSUER:lina-auth-server}
    public-key: ${LINA_JWT_PUBLIC_KEY:}
  # 중간발표(인증 없음) 한정 고정 데모 사용자/스페이스 — 3단계에서 JWT Claim 으로 대체
  demo:
    fixed-user-id: ${LINA_DEMO_USER_ID:user-001}
    fixed-groups: ${LINA_DEMO_GROUPS:Cloud-Control-Center}
    fixed-space-key: ${LINA_DEMO_SPACE_KEY:CPC}

spring:
  data:
    mongodb:
      database: lina_test
      auto-index-creation: true

# @DataMongoTest 는 de.flapdoodle.embed.mongo.spring30x 가 클래스패스에 있을 때
# 임베디드 MongoDB(랜덤 포트)를 자동 기동하고 spring.data.mongodb.uri 를 주입한다.
de:
  flapdoodle:
    mongodb:
      embedded:
        version: 7.0.4

logging:
  level:
    com.lina: INFO

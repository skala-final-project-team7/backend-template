# 테스트 전용 설정 — 실 DB/시크릿을 사용하지 않는다.
spring:
  datasource:
    url: jdbc:h2:mem:lina_auth_test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      # Flyway SQL 은 MySQL 전용 문법 — 테스트는 Entity 기반 스키마 생성
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false


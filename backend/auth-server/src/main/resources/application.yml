spring:
  application:
    name: lina-auth-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/lina_auth}
    username: ${MYSQL_USERNAME:}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # 스키마는 Flyway 마이그레이션(db/migration)이 단일 관리하고,
      # 부팅 시 Entity 매핑과 실 스키마를 대조해 entity↔migration drift 를 잡는다(validate)
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          # DATETIME 컬럼을 UTC 기준으로 읽고 쓴다 (docs/db-schema.md §6 — DATETIME (UTC))
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: ${AUTH_SERVER_PORT:8081}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    root: INFO
    com.lina: INFO

lina:
  oauth:
    confluence:
      client-id: ${CONFLUENCE_CLIENT_ID:}
      client-secret: ${CONFLUENCE_CLIENT_SECRET:}
      authorization-uri: ${CONFLUENCE_AUTHORIZATION_URI:}
      token-uri: ${CONFLUENCE_TOKEN_URI:}
      user-info-uri: ${CONFLUENCE_USER_INFO_URI:}
      redirect-uri: ${CONFLUENCE_REDIRECT_URI:}
      scopes: ${CONFLUENCE_SCOPES:}
      # AUTH-04/05 게이트웨이 base (accessible-resources, memberof)
      api-base-uri: ${CONFLUENCE_API_BASE_URI:https://api.atlassian.com}
      # accessible-resources 멀티 사이트 시 명시 선택용 (단일 사이트면 비워둠 — 임의 선택 금지)
      site-url: ${CONFLUENCE_SITE_URL:}
    # login→callback 한 사이클 동안 보관하는 state(CSRF) TTL
    state-ttl-seconds: ${OAUTH_STATE_TTL_SECONDS:600}
  jwt:
    issuer: ${LINA_JWT_ISSUER:lina-auth-server}
    private-key: ${LINA_JWT_PRIVATE_KEY:}
    public-key: ${LINA_JWT_PUBLIC_KEY:}
    access-token-ttl-seconds: ${LINA_JWT_ACCESS_TTL:3600}
    refresh-token-ttl-seconds: ${LINA_JWT_REFRESH_TTL:1209600}
  token-encryption:
    key: ${LINA_TOKEN_ENCRYPTION_KEY:}
  internal:
    # /internal/** 내부 호출자(service auth) 공유 키 — X-Internal-Api-Key 헤더 대조.
    # 미설정 시 내부 API 전부 거부(fail-closed). NetworkPolicy 와 병행(Feature 5/7)
    api-key: ${INTERNAL_API_KEY:}

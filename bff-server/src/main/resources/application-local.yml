server:
  port: 8080

spring:
  jpa:
    # 로컬 개발 편의: 엔티티 기준 스키마 자동 반영 (운영 기본값은 none)
    hibernate:
      ddl-auto: ${BFF_JPA_DDL_AUTO:update}
    show-sql: true

logging:
  level:
    com.lina: DEBUG
    org.springframework.web: DEBUG

lina:
  rag:
    base-url: ${ML_PIPELINE_BASE_URL:http://localhost:8000}
  auth-server:
    base-url: ${AUTH_SERVER_BASE_URL:http://localhost:8081}

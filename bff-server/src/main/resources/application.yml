spring:
  application:
    name: lina-bff-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  threads:
    virtual:
      enabled: true

server:
  port: ${BFF_SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    root: INFO
    com.lina: INFO

lina:
  rag:
    base-url: ${ML_PIPELINE_BASE_URL:}
    request-timeout-ms: ${ML_PIPELINE_TIMEOUT_MS:30000}
    sse-timeout-ms: ${ML_PIPELINE_SSE_TIMEOUT_MS:60000}
    history-turns: ${ML_PIPELINE_HISTORY_TURNS:10}
  auth-server:
    base-url: ${AUTH_SERVER_BASE_URL:}
  jwt:
    issuer: ${LINA_JWT_ISSUER:lina-auth-server}
    public-key: ${LINA_JWT_PUBLIC_KEY:}

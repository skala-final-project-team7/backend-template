spring:
  application:
    name: lina-bff-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${BFF_DB_URL:jdbc:mysql://localhost:3306/lina?serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${BFF_DB_USERNAME:lina}
    # 평문 secret 미포함 — 비밀번호는 환경 변수/Secret 으로만 주입
    password: ${BFF_DB_PASSWORD:}
    hikari:
      # 부팅 시 DB 미가동이어도 컨텍스트 로딩 실패 방지 (연결은 최초 사용 시 lazy)
      initialization-fail-timeout: -1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${BFF_JPA_DDL_AUTO:none}
    properties:
      hibernate:
        # 부팅 시 JDBC 메타데이터 조회 없이 dialect 고정 (DB 미연결 상태 기동 허용)
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

server:
  port: ${BFF_SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    root: INFO
    com.lina: INFO

lina:
  rag:
    base-url: ${ML_PIPELINE_BASE_URL:}
    request-timeout-ms: ${ML_PIPELINE_TIMEOUT_MS:30000}
    sse-timeout-ms: ${ML_PIPELINE_SSE_TIMEOUT_MS:60000}
    history-turns: ${ML_PIPELINE_HISTORY_TURNS:10}
  auth-server:
    base-url: ${AUTH_SERVER_BASE_URL:}
  jwt:
    issuer: ${LINA_JWT_ISSUER:lina-auth-server}
    public-key: ${LINA_JWT_PUBLIC_KEY:}
  # 중간발표(인증 없음) 한정 고정 데모 사용자/스페이스 — 3단계에서 JWT Claim 으로 대체
  demo:
    fixed-user-id: ${LINA_DEMO_USER_ID:user-001}
    fixed-groups: ${LINA_DEMO_GROUPS:Cloud-Control-Center}
    fixed-space-key: ${LINA_DEMO_SPACE_KEY:CPC}

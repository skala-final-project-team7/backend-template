spring:
  datasource:
    url: jdbc:h2:mem:lina;DB_CLOSE_DELAY=-1;MODE=LEGACY
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        # base 의 MySQLDialect 를 테스트에서 H2 로 override
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false

logging:
  level:
    com.lina: INFO
